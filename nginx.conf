worker_processes 1;
# removed daemon off so Nginx can be run in the background properly
events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    
    sendfile        on;
    keepalive_timeout  65;

    server {
        # Hugging Face exposes exactly this port
        listen 7860;

        # --- FRONTEND ---
        # Serve the built React/Vite files directly
        location / {
            root /app/frontend/dist;
            index index.html;
            
            # This makes React Router work on refresh
            try_files $uri $uri/ /index.html; 
        }

        # --- NODE.JS BACKEND ---
        # Any frontend request starting with /node_api/ will be sent to Node!
        # Example: fetch('/node_api/users') -> actually hits localhost:3000/users
        location /node_api/ {
            rewrite ^/node_api/(.*)$ /$1 break;
            proxy_pass http://127.0.0.1:3000;
            
            # Support WebSockets if you use Socket.io
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # --- PYTHON BACKEND ---
        # Any frontend request starting with /python_api/ will be sent to FastAPI/Python!
        # Example: fetch('/python_api/predict') -> actually hits localhost:8000/predict
        location /python_api/ {
            rewrite ^/python_api/(.*)$ /$1 break;
            proxy_pass http://127.0.0.1:8000;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
