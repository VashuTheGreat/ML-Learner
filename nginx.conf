worker_processes 1;
# removed daemon off so Nginx can be run in the background properly
events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    
    sendfile        on;
    keepalive_timeout  65;

    server {
        # Hugging Face exposes exactly this port
        listen 7860;

        # --- FRONTEND ---
        # Serve the built React/Vite files directly
        location / {
            root /app/client/dist;
            index index.html;
            
            # This makes React Router work on refresh
            try_files $uri $uri/ /index.html; 
        }

        # --- PYTHON BACKEND ---
        # Any frontend request starting with /server/ will be sent to FastAPI/Python!
        # Example: fetch('/server/predict') -> actually hits localhost:8000/predict
        location /server/ {
            rewrite ^/server/(.*)$ /$1 break;
            proxy_pass http://127.0.0.1:8000;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_cache_bypass $http_upgrade;
        }
    }
}
